name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lấy thông tin cấu hình từ Worker
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          echo "PWA_URL=${{ github.event.client_payload.url }}" >> $GITHUB_ENV
          echo "PKG_ID=com.libraryvn.twa.app" >> $GITHUB_ENV
          echo "PWA_HOST=https://libvn.pages.dev" >> $GITHUB_ENV
          
          APP_NAME="${{ github.event.client_payload.name }}"
          if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "undefined" ]; then APP_NAME="Library VN"; fi
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_ICON=https://upload.wikimedia.org/wikipedia/commons/d/d5/Progressive_Web_Apps_Logo.png" >> $GITHUB_ENV
          echo "DISPLAY_MODE=${{ github.event.client_payload.displayMode }}" >> $GITHUB_ENV

      - name: Cài đặt môi trường Java & Node.js
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt Bubblewrap CLI chính chủ
        run: npm i -g @bubblewrap/cli

      - name: Cấu hình đường dẫn Android SDK ngầm
        run: |
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_ROOT}"
          }
          EOF
          echo "SDK: $ANDROID_SDK_ROOT"
          echo "JDK: $JAVA_HOME"

      - name: Tự động ký chấp nhận mọi điều khoản Android SDK Licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Tự sinh dự án và Khởi tạo TWA Android
        run: |
          mkdir twa-project && cd twa-project
          cat <<EOF > twa-manifest.json
          {
            "packageId": "${{ env.PKG_ID }}",
            "host": "${{ env.PWA_HOST }}",
            "name": "${{ env.APP_NAME }}",
            "launcherName": "${{ env.APP_NAME }}",
            "displayMode": "${{ env.DISPLAY_MODE }}",
            "themeColor": "#2196F3",
            "navigationColor": "#000000",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "${{ env.APP_ICON }}",
            "maskableIconUrl": "${{ env.APP_ICON }}",
            "splashFadeoutMillis": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "alphaDependencies": false
          }
          EOF

          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "123456" -keypass "123456" \
            -dname "CN=LibraryVN, OU=App, O=Library, L=HN, S=HN, C=VN"

          bubblewrap init --manifest=twa-manifest.json --meta=--yes

      - name: Biên dịch APK
        run: |
          cd twa-project
          bubblewrap build --yes --skipSigning=false --keypass="123456" --storepass="123456"

      - name: Đẩy file APK lên GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "APK ${{ env.BUILD_ID }}"
          files: twa-project/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Báo về Worker
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
              -H "Content-Type: application/json" \
              -d '{
                "buildId": "${{ env.BUILD_ID }}",
                "status": "${{ job.status }}",
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/app-release-signed.apk"
              }'
          fi
