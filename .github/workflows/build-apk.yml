name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Payload
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          PWA_URL="${{ github.event.client_payload.url }}"
          PWA_URL="${PWA_URL%/}"
          echo "PWA_URL=$PWA_URL" >> $GITHUB_ENV
          PWA_HOST=$(echo "$PWA_URL" | sed 's|https://||' | sed 's|http://||' | cut -d'/' -f1)
          echo "PWA_HOST=$PWA_HOST" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Config Android SDK
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"${JAVA_HOME}\", \"androidSdkPath\": \"${ANDROID_SDK_ROOT}\"}" > ~/.bubblewrap/config.json

      - name: Accept SDK Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android.keystore \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=TWAApp,O=TWA,C=VN"

      - name: Khởi Tạo Dự Án TWA
        run: |
          mkdir -p twa-project && cd twa-project

          curl -fsSL "${{ env.PWA_URL }}/manifest.json" -o web-manifest.json

          node << 'EOF'
          const fs = require('fs');
          const webManifest = JSON.parse(fs.readFileSync('web-manifest.json', 'utf8'));

          let iconUrl = process.env.PWA_URL + '/assets/icon-512.png';
          if (webManifest.icons && webManifest.icons.length > 0) {
            const icon512 = webManifest.icons.find(i => i.sizes === '512x512')
                         || webManifest.icons[webManifest.icons.length - 1];
            const src = icon512.src;
            iconUrl = src.startsWith('http') ? src : process.env.PWA_URL + '/' + src.replace(/^\//, '');
          }

          const twaManifest = {
            packageId: "com.libraryvn.twa.app",
            host: process.env.PWA_HOST,
            startUrl: webManifest.start_url || "/",
            name: webManifest.name || "Library VN",
            launcherName: webManifest.short_name || "Library VN",
            display: "standalone",
            themeColor: webManifest.theme_color || "#000000",
            navigationColor: "#000000",
            backgroundColor: webManifest.background_color || "#000000",
            enableNotifications: false,
            iconUrl: iconUrl,
            maskableIconUrl: iconUrl,
            monochromeIconUrl: iconUrl,
            signingKey: {
              path: "../android.keystore",
              alias: "android"
            },
            appVersionCode: 1,
            appVersionName: "1.0.0",
            shortcuts: [],
            generatorApp: "bubblewrap-cli",
            webManifestUrl: process.env.PWA_URL + "/manifest.json",
            fallbackType: "customtabs",
            features: {},
            alphaDependencies: { enabled: false },
            enableSiteSettingsShortcut: true,
            isChromeOSOnly: false,
            isMetaQuest: false,
            fullScopeUrl: process.env.PWA_URL + "/",
            minSdkVersion: 19,
            orientation: "default",
            fingerprints: [],
            serviceAccountJsonFile: ""
          };

          fs.writeFileSync('twa-manifest.json', JSON.stringify(twaManifest, null, 2));
          console.log('=== TWA MANIFEST ===');
          console.log(JSON.stringify(twaManifest, null, 2));
          EOF

          # FIXED: dùng update thay init - không có prompt, đọc thẳng twa-manifest.json
          bubblewrap update
        env:
          PWA_URL: ${{ env.PWA_URL }}
          PWA_HOST: ${{ env.PWA_HOST }}

      - name: Biên dịch APK
        working-directory: twa-project
        run: bubblewrap build --yes
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "123456"
          BUBBLEWRAP_KEY_PASSWORD: "123456"

      - name: Locate APK & Set Env
        run: |
          APK_PATH=$(find twa-project -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          APK_NAME=$(basename "$APK_PATH")
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: Build ${{ env.BUILD_ID }}
          files: twa-project/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Worker
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            if [ "$STATUS" = "success" ]; then
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"success\", \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/${{ env.APK_NAME }}\"}"
            else
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"error\", \"message\": \"Build that bai.\"}"
            fi
          fi
