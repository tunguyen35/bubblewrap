name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lấy thông tin cấu hình từ Worker
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV

          PWA_URL="${{ github.event.client_payload.url }}"
          # Bỏ dấu / cuối nếu có
          PWA_URL="${PWA_URL%/}"
          echo "PWA_URL=$PWA_URL" >> $GITHUB_ENV

          # Lấy host sạch không có https://
          PWA_HOST=$(echo "$PWA_URL" | sed 's|https://||' | sed 's|http://||' | sed 's|/.*||')
          echo "PWA_HOST=$PWA_HOST" >> $GITHUB_ENV

          DISPLAY_MODE="${{ github.event.client_payload.displayMode }}"
          if [ -z "$DISPLAY_MODE" ] || [ "$DISPLAY_MODE" = "undefined" ]; then DISPLAY_MODE="standalone"; fi
          echo "DISPLAY_MODE=$DISPLAY_MODE" >> $GITHUB_ENV

      - name: Cài đặt môi trường Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cài đặt môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt Bubblewrap CLI và expect
        run: |
          npm i -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Cấu hình Android SDK
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"${JAVA_HOME}\", \"androidSdkPath\": \"${ANDROID_SDK_ROOT}\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Chấp nhận Android SDK Licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Tạo keystore ký APK
        run: |
          keytool -genkey -v \
            -keystore $HOME/android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "123456" \
            -keypass "123456" \
            -dname "CN=TWAApp, OU=App, O=TWA, L=HN, S=HN, C=VN"

      - name: Khởi tạo dự án TWA (tự động trả lời câu hỏi)
        run: |
          mkdir -p twa-project
          cp $HOME/android.keystore twa-project/android.keystore
          cd twa-project

          # Dùng expect để tự động trả lời tất cả câu hỏi của bubblewrap init
          expect << 'EOF'
          set timeout 120
          spawn bubblewrap init --manifest="${{ env.PWA_URL }}/manifest.json"
          
          # Domain
          expect "Domain:"
          send "\r"
          
          # URL path
          expect "URL path:"
          send "\r"
          
          # App name
          expect "name:"
          send "\r"
          
          # Short name
          expect "short name:"
          send "\r"
          
          # Display mode
          expect "Display mode:"
          send "\r"
          
          # Orientation
          expect "Orientation:"
          send "\r"
          
          # Theme color
          expect "Theme Color:"
          send "\r"
          
          # Background color
          expect "Background Color:"
          send "\r"
          
          # Start URL
          expect "Start URL:"
          send "\r"
          
          # Icon URL
          expect "Icon URL:"
          send "\r"
          
          # Maskable icon
          expect "Maskable Icon URL:"
          send "\r"
          
          # Monochrome icon
          expect "Monochrome Icon URL:"
          send "\r"
          
          # Package ID
          expect "package ID:"
          send "\r"
          
          # App version
          expect "version:"
          send "\r"
          
          # Version code
          expect "version code:"
          send "\r"
          
          # Signing key path
          expect "Signing key path:"
          send "./android.keystore\r"
          
          # Signing key alias
          expect "Signing key alias:"
          send "android\r"
          
          # Create new key
          expect -re "existing|new|password"
          send "\r"

          expect eof
          EOF
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "123456"
          BUBBLEWRAP_KEY_PASSWORD: "123456"

      - name: Biên dịch APK
        run: cd twa-project && bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "123456"
          BUBBLEWRAP_KEY_PASSWORD: "123456"

      - name: Đẩy APK lên GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "APK ${{ env.BUILD_ID }}"
          files: twa-project/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Báo về Worker
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            if [ "$STATUS" = "success" ]; then
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{
                  \"buildId\": \"${{ env.BUILD_ID }}\",
                  \"status\": \"success\",
                  \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/app-release-signed.apk\"
                }"
            else
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{
                  \"buildId\": \"${{ env.BUILD_ID }}\",
                  \"status\": \"error\",
                  \"message\": \"Build thất bại.\"
                }"
            fi
          fi
