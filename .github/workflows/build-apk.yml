- name: Khoi tao du an TWA
        run: |
          mkdir -p twa-project
          cp $HOME/android.keystore twa-project/android.keystore
          cd twa-project

          MANIFEST_URL="${{ env.PWA_URL }}/manifest.json"
          echo "Manifest URL: $MANIFEST_URL"

          # Ghi script expect ra file riêng để tránh lỗi biến
          cat > /tmp/init.exp << EXPEOF
          #!/usr/bin/expect -f
          set timeout 120
          set manifest_url [lindex \$argv 0]
          spawn bubblewrap init --manifest=\$manifest_url

          expect "Domain:"
          send "\r"
          expect "URL path:"
          send "\r"
          expect "name:"
          send "\r"
          expect "short name:"
          send "\r"
          expect "Display mode:"
          send "\r"
          expect "Orientation:"
          send "\r"
          expect "Theme Color:"
          send "\r"
          expect "Background Color:"
          send "\r"
          expect "Start URL:"
          send "\r"
          expect "Icon URL:"
          send "\r"
          expect "Maskable Icon URL:"
          send "\r"
          expect "Monochrome Icon URL:"
          send "\r"
          expect "package ID:"
          send "\r"
          expect "version:"
          send "\r"
          expect "version code:"
          send "\r"
          expect "Signing key path:"
          send "./android.keystore\r"
          expect "Signing key alias:"
          send "android\r"
          expect -re "existing|new|password"
          send "\r"
          expect eof
          EXPEOF

          chmod +x /tmp/init.exp
          expect /tmp/init.exp "$MANIFEST_URL"
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "123456"
          BUBBLEWRAP_KEY_PASSWORD: "123456"
