name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Payload
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          PWA_URL="${{ github.event.client_payload.url }}"
          PWA_URL="${PWA_URL%/}"
          echo "PWA_URL=$PWA_URL" >> $GITHUB_ENV
          PWA_HOST=$(echo "$PWA_URL" | sed 's|https://||' | sed 's|http://||' | cut -d'/' -f1)
          echo "PWA_HOST=$PWA_HOST" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Accept SDK Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore ${{ github.workspace }}/android.keystore \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=TWAApp,O=TWA,C=VN"

      - name: Install @bubblewrap/core
        run: npm install @bubblewrap/core

      # FIXED: Dùng @bubblewrap/core API trực tiếp — KHÔNG có prompt, KHÔNG bị treo
      - name: Generate & Build TWA (headless)
        run: |
          node << 'SCRIPT'
          const path = require('path');
          const { execSync } = require('child_process');

          async function main() {
            const { TwaManifest, TwaGenerator, AndroidSdkTools, Config, JdkHelper } = require('@bubblewrap/core');

            const PWA_URL  = process.env.PWA_URL;
            const PWA_HOST = process.env.PWA_HOST;
            const WORKSPACE = process.env.GITHUB_WORKSPACE;

            // Fetch web manifest
            const res  = await fetch(`${PWA_URL}/manifest.json`);
            const web  = await res.json();

            // Resolve icon URL
            let iconUrl = `${PWA_URL}/assets/icon-512.png`;
            if (web.icons && web.icons.length > 0) {
              const icon = web.icons.find(i => i.sizes === '512x512') || web.icons.at(-1);
              iconUrl = icon.src.startsWith('http') ? icon.src : `${PWA_URL}/${icon.src.replace(/^\//, '')}`;
            }

            // Build TwaManifest object
            const twaManifest = new TwaManifest({
              packageId:              'com.libraryvn.twa.app',
              host:                   PWA_HOST,
              name:                   web.name        || 'Library VN',
              launcherName:           web.short_name  || 'LibVN',
              display:                'standalone',
              themeColor:             { id: 'themeColor', hex: web.theme_color      || '#000000' },
              navigationColor:        { id: 'navigationColor', hex: '#000000' },
              navigationColorDark:    { id: 'navigationColorDark', hex: '#000000' },
              navigationDividerColor: { id: 'navigationDividerColor', hex: '#000000' },
              backgroundColor:        { id: 'backgroundColor', hex: web.background_color || '#000000' },
              startUrl:               web.start_url   || '/',
              iconUrl,
              maskableIconUrl:        iconUrl,
              monochromeIconUrl:      iconUrl,
              appVersionCode:         1,
              appVersionName:         '1.0.0',
              signingKey: {
                path:  path.join(WORKSPACE, 'android.keystore'),
                alias: 'android',
              },
              splashScreenFadeOutDuration: 300,
              enableNotifications:    false,
              shortcuts:              [],
              webManifestUrl:         `${PWA_URL}/manifest.json`,
              fallbackType:           'customtabs',
              features:               {},
              alphaDependencies:      { enabled: false },
              enableSiteSettingsShortcut: true,
              isChromeOSOnly:         false,
              isMetaQuest:            false,
              fullScopeUrl:           `${PWA_URL}/`,
              minSdkVersion:          19,
              orientation:            'default',
              fingerprints:           [],
            });

            const projectDir = path.join(WORKSPACE, 'twa-project');
            const config = new Config(
              process.env.JAVA_HOME,
              process.env.ANDROID_SDK_ROOT
            );

            // Generate Android project files — NO PROMPTS
            const generator = new TwaGenerator();
            await generator.generateAndroidProject(projectDir, twaManifest);
            console.log('✅ Android project generated');

            // Build APK using Gradle directly (bypass bubblewrap build prompts)
            console.log('🔨 Building APK...');
            execSync(
              './gradlew assembleRelease',
              {
                cwd: projectDir,
                stdio: 'inherit',
                env: {
                  ...process.env,
                  JAVA_HOME: process.env.JAVA_HOME,
                },
              }
            );
            console.log('✅ Build complete');

            // Sign APK
            const unsignedApk = path.join(projectDir, 'app/build/outputs/apk/release/app-release-unsigned.apk');
            const signedApk   = path.join(projectDir, 'app-release-signed.apk');
            execSync(
              `jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
               -keystore ${path.join(WORKSPACE, 'android.keystore')} \
               -storepass 123456 -keypass 123456 \
               -signedjar ${signedApk} ${unsignedApk} android`,
              { stdio: 'inherit' }
            );
            console.log(`✅ Signed APK: ${signedApk}`);

            // zipalign
            const buildToolsDir = require('fs').readdirSync(`${process.env.ANDROID_SDK_ROOT}/build-tools`).at(-1);
            const zipalign = `${process.env.ANDROID_SDK_ROOT}/build-tools/${buildToolsDir}/zipalign`;
            const alignedApk = path.join(projectDir, 'app-release-aligned.apk');
            execSync(`${zipalign} -v 4 ${signedApk} ${alignedApk}`, { stdio: 'inherit' });
            console.log(`✅ Aligned APK: ${alignedApk}`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
        env:
          PWA_URL:          ${{ env.PWA_URL }}
          PWA_HOST:         ${{ env.PWA_HOST }}
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Locate APK & Set Env
        run: |
          APK_PATH=$(find twa-project -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          APK_NAME=$(basename "$APK_PATH")
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: Build ${{ env.BUILD_ID }}
          files: twa-project/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Worker
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            if [ "$STATUS" = "success" ]; then
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"success\", \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/${{ env.APK_NAME }}\"}"
            else
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"error\", \"message\": \"Build that bai.\"}"
            fi
          fi
