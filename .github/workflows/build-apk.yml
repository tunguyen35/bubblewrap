name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Đọc dữ liệu Payload đầu vào
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          PWA_URL="${{ github.event.client_payload.url }}"
          PWA_URL="${PWA_URL%/}"
          echo "PWA_URL=$PWA_URL" >> $GITHUB_ENV
          PWA_HOST=$(echo "$PWA_URL" | sed 's|https://||' | sed 's|http://||' | cut -d'/' -f1)
          echo "PWA_HOST=$PWA_HOST" >> $GITHUB_ENV

      - name: Cấu hình môi trường Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cấu hình môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Đồng ý điều khoản Android SDK Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Tự động sinh Keystore Cố định theo Domain (Cơ chế PWABuilder)
        run: |
          # Băm MD5 của tên miền để tạo ra một chuỗi mật khẩu cố định duy nhất cho riêng trang web đó
          DYNAMIC_PASS=$(echo "${{ env.PWA_HOST }}" | md5sum | cut -d' ' -f1)
          echo "DYNAMIC_PASS=$DYNAMIC_PASS" >> $GITHUB_ENV
          
          # Sinh phím Keystore bọc thời gian bắt đầu cố định để giữ nguyên dấu vân tay SHA-256
          keytool -genkeypair \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -sigalg SHA256withRSA \
            -validity 10000 \
            -startdate "2026/01/01 00:00:00" \
            -keystore ${{ github.workspace }}/android.keystore \
            -storepass "$DYNAMIC_PASS" \
            -keypass "$DYNAMIC_PASS" \
            -dname "CN=${{ env.PWA_HOST }},O=TWA_Builder,C=VN"

      - name: Cài đặt thư viện lõi Bubblewrap
        run: npm install @bubblewrap/core

      - name: Biên dịch và Đóng gói TWA Headless
        run: |
          node << 'SCRIPT'
          const path = require('path');
          const fs   = require('fs');
          const { execSync } = require('child_process');

          async function main() {
            const { TwaManifest, TwaGenerator } = require('@bubblewrap/core');

            const PWA_URL   = process.env.PWA_URL;
            const PWA_HOST  = process.env.PWA_HOST;
            const WORKSPACE = process.env.GITHUB_WORKSPACE;
            const DYNAMIC_PASS = process.env.DYNAMIC_PASS;

            // Đồng bộ định dạng Package ID dựa trên tên miền sạch
            const domain = PWA_HOST.replace(/\./g, '_').replace(/-/g, '_').replace(/[^a-z0-9_]/gi, '').toLowerCase();
            const packageId = `net.twa.${domain}.app`;
            console.log('✅ Package ID Hệ Thống:', packageId);

            // Thu thập dữ liệu Web Manifest của khách hàng
            let web = {};
            try {
              const res = await fetch(`${PWA_URL}/manifest.json`);
              web = await res.json();
              console.log('✅ Đã nạp thành công manifest.json');
            } catch(e) {
              console.log('⚠️ Không fetch được manifest trực tuyến, chuyển hướng dùng cấu hình dự phòng.');
            }

            // Xử lý nạp ảnh Icon ứng dụng
            let iconUrl = "https://upload.wikimedia.org/wikipedia/commons/d/d5/Progressive_Web_Apps_Logo.png";
            if (web.icons && web.icons.length > 0) {
              const icon = web.icons.find(i => i.sizes === '512x512') || web.icons.at(-1);
              iconUrl = icon.src.startsWith('http') ? icon.src : `${PWA_URL}/${icon.src.replace(/^\//, '')}`;
            }

            const twaManifest = new TwaManifest({
              packageId,
              host:                         PWA_HOST,
              name:                         web.name       || 'TWA App',
              launcherName:                 web.short_name || 'TWA App',
              display:                      web.display    || 'standalone',
              themeColor:                   web.theme_color      || '#2196F3',
              themeColorDark:               '#000000',
              navigationColor:              '#000000',
              navigationColorDark:          '#000000',
              navigationDividerColor:       '#00000000',
              navigationDividerColorDark:   '#000000',
              backgroundColor:              web.background_color || '#ffffff',
              startUrl:                     web.start_url  || '/',
              iconUrl,
              maskableIconUrl:              iconUrl,
              monochromeIconUrl:            iconUrl,
              appVersion:                   '1.0.0',
              appVersionCode:               1,
              signingKey: {
                path:  path.join(WORKSPACE, 'android.keystore'),
                alias: 'android',
              },
              splashScreenFadeOutDuration: 300,
              enableNotifications:          false,
              shortcuts:                    [],
              webManifestUrl:               `${PWA_URL}/manifest.json`,
              fallbackType:                 'customtabs',
              features:                     {},
              alphaDependencies:            { enabled: false },
              enableSiteSettingsShortcut:   true,
              isChromeOSOnly:               false,
              isMetaQuest:                  false,
              fullScopeUrl:                 `${PWA_URL}/`,
              minSdkVersion:                24,
              targetSdkVersion:             33,
              orientation:                  'default',
              fingerprints:                 [],
            });

            const projectDir = path.join(WORKSPACE, 'twa-project');
            const generator = new TwaGenerator();
            const log = { debug: console.log, info: console.log, warn: console.warn, error: console.error };
            
            // 1. Dựng khung dự án cấu trúc Android sạch
            await generator.createTwaProject(projectDir, twaManifest, log);
            console.log('✅ Khởi tạo project thành công tại:', projectDir);

            // 2. Gọi Gradle dựng file APK thô chưa ký số
            execSync('./gradlew assembleRelease', {
              cwd: projectDir,
              stdio: 'inherit',
              env: { ...process.env },
            });
            console.log('✅ Thực thi biên dịch Gradle thành công');

            // 3. Định vị thư mục Android SDK Build Tools có sẵn trong máy ảo
            const buildToolsVer = fs.readdirSync(`${process.env.ANDROID_SDK_ROOT}/build-tools`).sort().at(-1);
            const buildToolsPath = path.join(process.env.ANDROID_SDK_ROOT, 'build-tools', buildToolsVer);
            
            const unsignedApk = path.join(projectDir, 'app/build/outputs/apk/release/app-release-unsigned.apk');
            const alignedApk = path.join(projectDir, 'app-release-aligned.apk');
            const finalApk = path.join(WORKSPACE, 'final-app-release.apk');

            // Tiến trình A: Căn chỉnh bộ nhớ tối ưu hệ thống (Zipalign)
            console.log('🚀 Đang xử lý Zipalign tối ưu tập tin...');
            execSync(`${path.join(buildToolsPath, 'zipalign')} -v 4 ${unsignedApk} ${alignedApk}`, { stdio: 'ignore' });

            // Tiến trình B: Ký số tích hợp chứng chỉ V2/V3 (Apksigner) để triệt tiêu lỗi "App không cài đặt được"
            console.log('🚀 Đang chạy Apksigner bọc chứng chỉ V2/V3 toàn vẹn...');
            execSync(
              `${path.join(buildToolsPath, 'apksigner')} sign ` +
              `--ks ${path.join(WORKSPACE, 'android.keystore')} ` +
              `--ks-pass pass:${DYNAMIC_PASS} --key-pass pass:${DYNAMIC_PASS} ` +
              `--out ${finalApk} ${alignedApk}`,
              { stdio: 'inherit' }
            );
            console.log('🎯 Quá trình đóng gói hoàn tất thành công!');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
        env:
          PWA_URL: ${{ env.PWA_URL }}
          PWA_HOST: ${{ env.PWA_HOST }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          DYNAMIC_PASS: ${{ env.DYNAMIC_PASS }}

      - name: Tự động trích xuất SHA-256 và Đẻ file assetlinks.json chính chủ
        run: |
          # Lấy chính xác chuỗi SHA-256 sạch từ file Keystore
          SHA256_FINGERPRINT=$(keytool -list -v -keystore ${{ github.workspace }}/android.keystore -storepass "${{ env.DYNAMIC_PASS }}" | grep "SHA256:" | awk '{print $2}')
          
          # Định dạng lại package_name chuẩn hóa theo logic Node.js bên trên
          CLEAN_DOMAIN=$(echo "${{ env.PWA_HOST }}" | sed 's/\./_/g' | sed 's/-/_/g' | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME="net.twa.${CLEAN_DOMAIN}.app"
          
          # Ghi đè cấu trúc JSON chuẩn của Google Asset Links ra file vật lý
          cat << EOF > ${{ github.workspace }}/assetlinks.json
          [
            {
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                "namespace": "android_app",
                "package_name": "$PACKAGE_NAME",
                "sha256_cert_fingerprints": ["$SHA256_FINGERPRINT"]
              }
            }
          ]
          EOF
          
          echo "✅ Đã đẻ thành công file assetlinks.json lý tưởng cho domain ${{ env.PWA_HOST }}"
          echo "Mã SHA-256 của Web này là: $SHA256_FINGERPRINT"

      - name: Thiết lập môi trường phát hành xuất xưởng
        run: |
          echo "APK_PATH=${{ github.workspace }}/final-app-release.apk" >> $GITHUB_ENV
          echo "ASSETLINKS_PATH=${{ github.workspace }}/assetlinks.json" >> $GITHUB_ENV

      - name: Phát hành ứng dụng và file Xác thực lên GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: Build ${{ env.BUILD_ID }}
          files: |
            ${{ env.APK_PATH }}
            ${{ env.ASSETLINKS_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gửi phản hồi kèm link tải file về cho Worker Webhook
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            BASE_URL="${{ secrets.WORKER_WEBHOOK_URL }}"
            BASE_URL="${BASE_URL%/}"
            
            if [ "$STATUS" = "success" ]; then
              RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}"
              
              curl -X POST "$BASE_URL/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"success\", \"downloadUrl\": \"${RELEASE_URL}/final-app-release.apk\", \"assetlinksUrl\": \"${RELEASE_URL}/assetlinks.json\"}"
            else
              curl -X POST "$BASE_URL/webhook" \
                -H "Content-Type: application/json" \
                -d "{\"buildId\": \"${{ env.BUILD_ID }}\", \"status\": \"error\", \"message\": \"Quá trình biên dịch hoặc tạo cấu hình tại GitHub gặp sự cố.\"}"
            fi
          fi
