name: TWA Production Builder

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lấy thông tin cấu hình từ Worker
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          
          PWA_URL="${{ github.event.client_payload.url }}"
          echo "PWA_URL=$PWA_URL" >> $GITHUB_ENV
          echo "PKG_ID=com.libraryvn.twa.app" >> $GITHUB_ENV
          echo "PWA_HOST=libvn.pages.dev" >> $GITHUB_ENV
          
          APP_NAME="${{ github.event.client_payload.name }}"
          if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "undefined" ]; then APP_NAME="Library VN"; fi
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          
          echo "APP_ICON=https://upload.wikimedia.org/wikipedia/commons/d/d5/Progressive_Web_Apps_Logo.png" >> $GITHUB_ENV
          
          DISPLAY_MODE="${{ github.event.client_payload.displayMode }}"
          if [ -z "$DISPLAY_MODE" ] || [ "$DISPLAY_MODE" = "undefined" ]; then DISPLAY_MODE="standalone"; fi
          echo "DISPLAY_MODE=$DISPLAY_MODE" >> $GITHUB_ENV

      - name: Cài đặt môi trường Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cài đặt môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt Bubblewrap CLI
        run: npm i -g @bubblewrap/cli

      - name: Cấu hình đường dẫn Android SDK
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"${JAVA_HOME}\", \"androidSdkPath\": \"${ANDROID_SDK_ROOT}\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Chấp nhận Android SDK Licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Tạo keystore ký APK
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "123456" \
            -keypass "123456" \
            -dname "CN=LibraryVN, OU=App, O=Library, L=HN, S=HN, C=VN"

      - name: Khởi tạo dự án TWA
        run: |
          mkdir twa-project && cd twa-project
          cp ../android.keystore ./android.keystore

          cat <<'EOF' > twa-manifest.json
          {
            "packageId": "com.libraryvn.twa.app",
            "host": "libvn.pages.dev",
            "startUrl": "/",
            "name": "Library VN",
            "launcherName": "Library VN",
            "display": "standalone",
            "themeColor": "#2196F3",
            "navigationColor": "#000000",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "iconUrl": "https://upload.wikimedia.org/wikipedia/commons/d/d5/Progressive_Web_Apps_Logo.png",
            "maskableIconUrl": "https://upload.wikimedia.org/wikipedia/commons/d/d5/Progressive_Web_Apps_Logo.png",
            "splashFadeoutMillis": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "alphaDependencies": false
          }
          EOF

          bubblewrap init --manifest="https://libvn.pages.dev/manifest.json"

      - name: Biên dịch APK
        run: cd twa-project && bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "123456"
          BUBBLEWRAP_KEY_PASSWORD: "123456"

      - name: Đẩy APK lên GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "APK ${{ env.BUILD_ID }}"
          files: twa-project/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Báo về Worker
        if: always()
        run: |
          if [ ! -z "${{ secrets.WORKER_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            if [ "$STATUS" = "success" ]; then
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{
                  \"buildId\": \"${{ env.BUILD_ID }}\",
                  \"status\": \"success\",
                  \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/app-release-signed.apk\"
                }"
            else
              curl -X POST "${{ secrets.WORKER_WEBHOOK_URL }}/webhook" \
                -H "Content-Type: application/json" \
                -d "{
                  \"buildId\": \"${{ env.BUILD_ID }}\",
                  \"status\": \"error\",
                  \"message\": \"Build thất bại.\"
                }"
            fi
          fi
